<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Health Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>System Health Dashboard</h1>

    <div id="metrics">
        <div class="card">
            <h2>CPU</h2>
            <p id="cpu">Loading...</p>
        </div>

        <div class="card">
            <h2>Memory</h2>
            <p id="memory">Loading...</p>
        </div>

        <div class="card">
            <h2>Disk</h2>
            <p id="disk">Loading...</p>
        </div>

	<div class="card">
		<h2>Top Processes</h2>
		<ul id="processes"></ul>
	</div>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
